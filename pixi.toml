[workspace]
authors = ["Andrei Guliaev <andrei.guliaev@scilifelab.uu.se>"]
channels = ["bioconda", "conda-forge"]
name = "PoN Builder"
platforms = ["linux-64", "osx-arm64"]
version = "1.0"

[tasks]
precom = "PYTHONPATH=. pre-commit run pytest-check --all-files"
tests = "PYTHONPATH=. pytest .tests/unit/"
precom-fmt = "pre-commit run snakefmt"
fmt-wf = "snakefmt -l 130 workflow/"
fmt-py="snakefmt -l 130 workflow/scripts/"
fmt-tests="snakefmt -l 130 .tests/unit/"
all-dry = "snakemake --configfile config/config.yaml -n --cores 1"
all-full = "snakemake --configfile config/config.yaml --profile profiles/marvin_cpu"
test-dry = "snakemake -n --configfile config/config.yaml --config samples=config/samples.tsv units=config/units.tsv --cores 1"
test-full = "snakemake --configfile config/config.yaml --config samples=config/samples.tsv units=config/units.tsv --profile profiles/marvin_cpu"
rulegraph = "snakemake --configfile config/config.yaml --config samples=config/samples.tsv units=config/units.tsv --rulegraph | dot -Tsvg > images/rulegraph.svg"
dotfile = "snakemake --configfile config/config.yaml --config samples=config/samples.tsv units=config/units.tsv --rulegraph > images/rulegraph.dot"


# Shared conda dependencies (available in all environments)
[dependencies]
pulp = "<2.8"
snakefmt = ">=0.11.0,<0.12"
pycodestyle = ">=2.14.0,<3"
pytest = ">=8.4.1,<9"
drmaa = ">=0.7.9,<0.8"

# Shared PyPI dependencies (docs tools, available in all environments)
[pypi-dependencies]
setuptools = "<70"
jinja2 = "<3.1.0"
mkdocs = "==1.4.2"
pymdown-extensions = "==9.10"
mkdocs-schema-reader = "==0.11.1"
mkdocs-simple-hooks = "==0.1.5"
mdx-spanner = "==0.0.5"
mkdocs-yaml-schema-plugin = "==0.2.3"
mkdocs-snakemake-rule-plugin = "==0.3.3"
mkdocs-material = "==9.1.7"

# hydra-genetics 4.x / Snakemake 7 environment
[feature.hg4.dependencies]
python = "3.9.*"

[feature.hg4.pypi-dependencies]
hydra-genetics = "==4.0.0"
snakemake = ">=7.32.4, <8"

# snakemake 9.x & hydra-genetics 4.x
[feature.snakemake9.dependencies]
python = ">=3.11,<3.14"

[feature.snakemake9.pypi-dependencies]
snakemake = ">=9.0.0,<10"
hydra-genetics = ">=4.0.0"

[environments]
default = { features = ["hg4"], solve-group = "hg4" }
snakemake9 = { features = ["snakemake9"], solve-group = "snakemake9" }
